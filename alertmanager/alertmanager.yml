route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:9093/alert'

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://localhost:9093/alert'
        send_resolved: true

